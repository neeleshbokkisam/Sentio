<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sentio — History</title>
  <link rel="stylesheet" href="/static/css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <nav class="nav">
    <span class="logo">Sentio</span>
    <a href="/">Live</a>
    <a href="/insights" class="active">History</a>
    <a href="/calibrate">Calibrate</a>
  </nav>

  <main class="insights-page">
    <section class="charts-row">
      <div class="chart-box">
        <h2>Today</h2>
        <canvas id="dailyChart"></canvas>
      </div>
      <div class="chart-box">
        <h2>This week</h2>
        <canvas id="weeklyChart"></canvas>
      </div>
    </section>

    <section class="sessions-section">
      <h2>Sessions</h2>
      <table id="sessionsTable">
        <thead>
          <tr><th>Started</th><th>Mode</th><th>Readings</th><th>Top mood</th><th></th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>

    <section class="replay-section hidden" id="replaySection">
      <h2>Session replay</h2>
      <input type="range" id="replaySlider" min="0" max="0" value="0">
      <div id="replayDetail"></div>
    </section>
  </main>

  <script src="/static/js/insights.js"></script>
</body>
</html>

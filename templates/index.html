<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sentio</title>
  <link rel="stylesheet" href="/static/css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <nav class="nav">
    <span class="logo">Sentio</span>
    <a href="/" class="active">Live</a>
    <a href="/insights">History</a>
    <a href="/calibrate">Calibrate</a>
  </nav>

  <main class="live">
    <div class="live-grid">
      <section class="card feed-card">
        <video id="webcam" autoplay playsinline muted></video>
        <div class="controls">
          <button id="startBtn">Start</button>
          <button id="stopBtn" class="secondary" disabled>Stop</button>
        </div>
      </section>

      <section class="card mood-card">
        <p class="label">Your mood</p>
        <div class="mood-ring" id="moodRing">
          <div class="mood-label" id="moodLabel">
            <span class="mood-primary">—</span>
          </div>
        </div>
        <div class="signals">
          <div class="signal-row">
            <span class="signal-name">Face</span>
            <span class="signal-emotion" id="faceEmotion">—</span>
            <span class="signal-dot" id="faceDot"></span>
            <span class="signal-strength" id="faceSignal">offline</span>
          </div>
          <div class="signal-row">
            <span class="signal-name">Voice</span>
            <span class="signal-emotion" id="voiceEmotion">—</span>
            <span class="signal-dot" id="voiceDot"></span>
            <span class="signal-strength" id="voiceSignal">offline</span>
          </div>
        </div>
      </section>
    </div>

    <section class="banner hidden" id="offlineBanner">
      Can't read your face right now — mood is from voice only.
    </section>

    <section class="banner mismatch hidden" id="mismatchBanner">
      Your face looks <strong id="mFace"></strong> but your voice sounds <strong id="mVoice"></strong>.
    </section>

    <section class="card timeline-card">
      <p class="label">Timeline</p>
      <canvas id="timelineChart"></canvas>
    </section>

    <details class="debug-panel">
      <summary>Debug</summary>
      <pre id="debugText">—</pre>
    </details>
  </main>

  <div class="modal hidden" id="calModal">
    <div class="modal-box">
      <h2>Calibrate Sentio?</h2>
      <p>~30 seconds. Helps with your resting face and voice.</p>
      <button onclick="location.href='/calibrate'">Calibrate</button>
      <button class="secondary" id="skipCal">Skip</button>
    </div>
  </div>

  <script src="/static/js/dashboard.js"></script>
  <script src="/static/js/media.js"></script>
</body>
</html>

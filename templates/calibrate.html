<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sentio — Calibrate</title>
  <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
  <nav class="nav">
    <span class="logo">Sentio</span>
    <a href="/">Live</a>
    <a href="/insights">History</a>
    <a href="/calibrate" class="active">Calibrate</a>
  </nav>

  <main class="calibrate-page cal-wizard">
    <h1>Calibration</h1>
    <p class="label" style="text-transform:none;letter-spacing:0;font-size:0.9rem;color:var(--muted)">
      Three quick steps. Follow the timer.
    </p>

    <div class="cal-step">
      <p id="calInstruction">Press start when ready.</p>
      <div class="cal-timer" id="calTimer">—</div>
      <div class="cal-progress"><div class="cal-progress-fill" id="calProgress"></div></div>
      <p id="calStatus" style="color:var(--muted);font-size:0.875rem"></p>
    </div>

    <video id="calVideo" autoplay playsinline muted width="480"></video>

    <div class="cal-controls" id="calControls">
      <button id="calStart">Start</button>
      <button class="secondary" id="calSkip">Skip</button>
      <a href="/" class="btn-link">Go to Live</a>
    </div>
    <div class="cal-controls hidden" id="calDoneControls">
      <a href="/" class="btn-link primary">Go to Live</a>
    </div>
  </main>

  <script src="/static/js/calibrate.js"></script>
</body>
</html>
